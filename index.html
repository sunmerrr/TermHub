<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TermHub</title>
<link rel="stylesheet" href="/style.css?v=3">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
</head>
<body>

<div id="login">
  <h2 style="font-size:20px">TermHub</h2>
  <input id="pw" type="password" placeholder="Password" />
  <button id="login-btn">Login</button>
  <span id="login-err">Incorrect password</span>
</div>

<div id="app" style="display:none;flex-direction:column;height:100dvh;overflow:hidden">
  <header>
    <div id="status-dot" class="off"></div>
    <h1>TermHub</h1>
    <div class="layout-group">
      <button id="layout-tab-btn" class="header-btn layout-active">Tab</button>
      <button id="layout-split-btn" class="header-btn">Split</button>
    </div>
    <div class="header-divider"></div>
    <button id="scan-btn" class="header-btn">🔍</button>
    <button id="toggle-toolbar-btn" class="header-btn accent">+</button>
  </header>

  <div class="toolbar" id="spawn-toolbar" style="display:none">
    <input id="cmd-input" placeholder="Command" value="claude" />
    <div class="dir-wrap">
      <input id="cwd-input" placeholder="Working directory" />
      <div class="dir-dropdown" id="dir-dropdown">
        <div class="dir-section">⭐ Favorites</div>
        <div id="fav-list"></div>
        <div class="add-fav" id="add-fav-btn">+ Add current path to favorites</div>
        <div class="dir-section">🕐 Recent</div>
        <div id="recent-list"></div>
      </div>
    </div>
    <button id="dir-btn">📁</button>
    <button id="spawn-btn" class="primary">+ New</button>
  </div>

  <!-- Tab mode -->
  <div id="tab-mode" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>

  <!-- Split mode -->
  <div id="split-mode" style="flex:1;overflow:hidden;display:none">
    <div id="split-content"></div>
  </div>
</div>

<script src="/js/layout.js?v=3"></script>
<script src="/js/favorites.js?v=3"></script>
<script src="/js/ws.js?v=3"></script>
<script src="/js/preview.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui-slim.min.js"></script>
<script src="/js/git-diff.js?v=3"></script>
<script src="/js/workers.js?v=3"></script>
<script src="/js/app.js?v=3"></script>
</body>
</html>
